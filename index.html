<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap Kansrekenen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e8e6f0; min-height: 100vh; display: flex; flex-direction: column; }
  h1 { text-align: center; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.08em; color: #9b91d4; padding: 18px 0 10px; text-transform: uppercase; }
  .layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }
  .map-area { flex: 1; overflow: auto; padding: 20px; }
  svg#mindmap { width: 100%; min-width: 700px; height: auto; display: block; }
  .node-group { cursor: pointer; }
  .node-group rect { transition: filter 0.15s; }
  .node-group:hover rect { filter: brightness(1.3); }
  .node-group.active rect { filter: brightness(1.5) drop-shadow(0 0 8px rgba(127,119,221,0.6)); }
  .panel { width: 400px; min-width: 300px; background: #16181f; border-left: 1px solid #2a2d3a; display: flex; flex-direction: column; transition: width 0.3s; }
  .panel.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }
  .panel-header { padding: 16px 18px 12px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 10px; }
  .panel-topic { font-size: 1rem; font-weight: 600; flex: 1; color: #e8e6f0; }
  .panel-close { background: none; border: none; color: #666; cursor: pointer; font-size: 1.2rem; padding: 2px 8px; border-radius: 4px; }
  .panel-close:hover { background: #2a2d3a; color: #e8e6f0; }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.91rem; line-height: 1.75; color: #c8c4dc; }
  .panel-body h3 { color: #9b91d4; font-size: 0.95rem; font-weight: 600; margin: 18px 0 8px; }
  .panel-body h3:first-child { margin-top: 0; }
  .panel-body p { margin-bottom: 10px; }
  .panel-body strong { color: #e8e6f0; font-weight: 600; }
  .panel-body em { color: #b0a8d8; font-style: italic; }
  .panel-body code { background: #1e2130; border: 1px solid #2a2d3a; border-radius: 4px; padding: 2px 7px; font-family: 'Courier New', monospace; font-size: 0.88rem; color: #a8d8a8; }
  .panel-body pre { background: #1a1d28; border: 1px solid #2a2d3a; border-radius: 8px; padding: 14px 16px; margin: 12px 0; overflow-x: auto; }
  .panel-body pre code { background: none; border: none; padding: 0; color: #a8d8a8; font-size: 0.87rem; }
  .panel-body blockquote { border-left: 3px solid #3d3489; margin: 12px 0; padding: 8px 14px; background: #141620; border-radius: 0 6px 6px 0; color: #b0a8d8; font-size: 0.88rem; }
  .panel-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.86rem; }
  .panel-body th { background: #1e2130; color: #9b91d4; padding: 7px 10px; text-align: left; border: 1px solid #2a2d3a; }
  .panel-body td { padding: 6px 10px; border: 1px solid #2a2d3a; color: #c0bcd8; }
  .panel-body td:first-child { color: #e8e6f0; }
  .panel-body ul { padding-left: 18px; margin: 8px 0; }
  .panel-body li { margin-bottom: 4px; }
  .hint { text-align: center; color: #2a2d3a; font-size: 11px; margin-top: 8px; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
</style>
</head>

<script>
const CONTENT = {
  "overzicht": {
    title: `Kansrekenen — overzicht`,
    html: `<p>Kansrekenen meet hoe waarschijnlijk iets is, uitgedrukt als een getal tussen 0 (onmogelijk) en 1 (zeker). Kernformules: P(A) = gunstig/totaal</p><ul><li>P(Aᶜ) = 1−P(A)</li><li>P(A∪B) = P(A)+P(B)−P(A∩B)</li><li>P(A|B) = P(A∩B)/P(B)</li><li>Bayes: P(B|A) = P(A|B)·P(B)/P(A)</li></ul>`
  },
  "uitkomstenruimte": {
    title: `Uitkomstenruimte Ω`,
    html: `<p>De uitkomstenruimte Ω is de verzameling van ALLE mogelijke uitkomsten van een experiment. Dobbelsteen: Ω = {1,2,3,4,5,6}</p><ul><li>Munt: Ω = {kop, munt}</li><li>Twee munten: Ω = {(K,K),(K,M),(M,K),(M,M)}. Het totaal aantal uitkomsten in Ω is de noemer in de klassieke kansformule.</li></ul>`
  },
  "gebeurtenis": {
    title: `Gebeurtenis A`,
    html: `<p>Een gebeurtenis A is een deelverzameling van Ω. Voorbeeld: A = "even getal" = {2,4,6}. Bewerkingen: complement Aᶜ (alles wat niet in A zit)</p><ul><li>doorsnede A∩B (wat in beide zit)</li><li>vereniging A∪B (wat in A of B zit).</li></ul>`
  },
  "klassiek": {
    title: `Klassieke kansformule`,
    html: `<p>P(A) = gunstige uitkomsten / totaal aantal uitkomsten. Alleen geldig als alle uitkomsten even waarschijnlijk zijn. Voorbeelden: P(6 gooien) = 1/6</p><ul><li>P(even) = 3/6 = 0,5</li><li>P(aas uit 52 kaarten) = 4/52 = 1/13.</li></ul>`
  },
  "complement": {
    title: `Complementregel`,
    html: `<p>P(Aᶜ) = 1 − P(A). Gebruik de complementregel als het makkelijker is om de kans op het TEGENOVERGESTELDE te berekenen. Voorbeeld: P(minstens één kop bij 3 munten) = 1 − P(geen kop) = 1 − (1/2)³ = 7/8.</p>`
  },
  "optelling": {
    title: `Optellingsregel`,
    html: `<p>Mutueel uitsluitend (A∩B=∅): P(A∪B) = P(A) + P(B). Algemeen: P(A∪B) = P(A) + P(B) − P(A∩B). Trek de doorsnede af om dubbeltelling te vermijden. Controleer altijd eerst of A en B tegelijk kunnen optreden.</p>`
  },
  "uitsluitend": {
    title: `Uitsluitend vs. algemeen`,
    html: `<p>Mutueel uitsluitend: A en B kunnen NIET tegelijk optreden → P(A∪B) = P(A)+P(B). Overlappend: A en B KAN BEIDEN optreden → P(A∪B) = P(A)+P(B)−P(A∩B). Voorbeeld mutueel uitsluitend: "1 gooien" en "6 gooien". Voorbeeld overlappend: "harten" en "aas" (de harten-aas is allebei).</p>`
  },
  "combinatoriek": {
    title: `Combinatoriek`,
    html: `<p>Vier telmodellen: (1) volgorde telt, geen herhaling → Variatie V(n,k)=n!/(n−k)! (2) alle n rangschikken → Permutatie P(n)=n! (3) volgorde telt niet, geen herhaling → Combinatie C(n,k)=n!/(k!(n−k)!) (4) herhaling mag, volgorde telt niet → C_h(n,k)=C(n+k−1,k). Telprincipe: stap1×stap2×… mogelijkheden.</p>`
  },
  "faculteit": {
    title: `Faculteit n!`,
    html: `<p>n! = n × (n−1) × … × 2 × 1. Betekenis: aantal manieren om n objecten te rangschikken. Per definitie: 0!=1. Tabel: 3!=6</p><ul><li>5!=120</li><li>6!=720</li><li>10!=3.628.800. Voorbeeld: 5 renners kunnen op 5!=120 manieren finishen.</li></ul>`
  },
  "variaties": {
    title: `Variaties V(n,k)`,
    html: `<p>Variatie V(n,k): geordende keuze van k uit n, zonder herhaling. V(n,k) = n!/(n−k)!. Verschil met permutatie: bij een variatie kies je k uit n (k≤n); bij een permutatie rangschik je ALLE n elementen. Voorbeeld: goud/zilver/brons onder 8 atleten: V(8,3)=8×7×6=336.</p>`
  },
  "permutaties": {
    title: `Permutaties P(n)`,
    html: `<p>Permutatie P(n)=n!: rangschikking van ALLE n elementen. Met herhaling (pincode): nᵏ. Niet-onderscheidbaar: n!/(n₁!×n₂!×…). Voorbeelden: BANAAN (B×1,A×3,N×2): 6!/(1!×3!×2!)=60</p><ul><li>MISSISSIPPI: 11!/(1!×4!×4!×2!)=34.650.</li></ul>`
  },
  "combinaties": {
    title: `Combinaties C(n,k)`,
    html: `<p>C(n,k) = n!/(k!×(n−k)!): ongeordende keuze van k uit n, geen herhaling. Eigenschappen: C(n,0)=1</p><ul><li>C(n,n)=1</li><li>C(n,k)=C(n,n−k). Voorbeelden: commissie van 3 uit 8: C(8,3)=56</li><li>lotto 6 uit 45: C(45,6)=8.145.060.</li></ul>`
  },
  "pascal": {
    title: `Driehoek van Pascal`,

  "herhaling": {

  "binstelling": {

  "voorwaardelijk": {
    title: `Voorwaardelijke kans`,
    html: `<p>P(A|B) = P(A∩B)/P(B): kans op A gegeven dat B al is opgetreden. We verkleinen de uitkomstenruimte naar alleen de uitkomsten waar B optreedt. Vermenigvuldigingsregel: P(A∩B) = P(A|B)×P(B). Voorbeeld: klas 18 meisjes/12 jongens, 6 meisjes met bril → P(bril|meisje) = 6/18 = 1/3.</p>`

  "formule-vk": {
    title: `P(A|B) = P(A∩B)/P(B)`,
    html: `<p>P(A|B) = P(A∩B)/P(B). Termen: P(A|B) = wat we willen weten</p><ul><li>P(A∩B) = kans dat A én B allebei optreden</li><li>P(B) = kans op B (moet >0 zijn). Vermenigvuldigingsregel (omgekeerd): P(A∩B) = P(A|B)×P(B).</li></ul>`

  "onafhankelijk": {
    title: `Onafhankelijkheid`,
    html: `<p>Onafhankelijk: P(A|B)=P(A) → P(A∩B)=P(A)×P(B). Afhankelijk: eerste uitkomst beïnvloedt de tweede. Onafhankelijk voorbeeld: munt 2×: P(K,M)=1/2×1/2=1/4. Afhankelijk voorbeeld: 2 azen zonder terugleggen: P=4/52×3/51=1/221.</p>`

  "totale-kans": {

  },
  "bayes": {
    title: `Stelling van Bayes`,
    html: `<p>P(B|A) = P(A|B)×P(B)/P(A): draait de voorwaardelijke kans om. Stappen: (1) bepaal prior P(B) (2) bepaal likelihood P(A|B) (3) bereken P(A) via wet totale kans (4) vul in. Medisch voorbeeld: ziekte 1%, test 99% sensitief, 5% vals-positief → P(ziek|+)≈16,7% (basisfrequentie is cruciaal!).</p>`

  "formule-bayes": {
    title: `Formule van Bayes`,

const panel = document.getElementById('panel');
const panelTopic = document.getElementById('panel-topic');
const panelBody = document.getElementById('panel-body');

document.querySelectorAll('.node-group').forEach(node => {
  node.addEventListener('click', () => {
    const id = node.dataset.id;
    const data = CONTENT[id];
    if (!data) return;
    document.querySelectorAll('.node-group').forEach(n => n.classList.remove('active'));
    node.classList.add('active');
    panelTopic.textContent = data.title;
    panelBody.innerHTML = data.html;
    panel.classList.remove('collapsed');
  });
});

function closePanel() {
  panel.classList.add('collapsed');
  document.querySelectorAll('.node-group').forEach(n => n.classList.remove('active'));
}
</script>
