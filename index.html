<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e8e6f0; min-height: 100vh; display: flex; flex-direction: column; }
  h1 { text-align: center; font-size: 1.1rem; font-weight: 500; letter-spacing: 0.08em; color: #9b91d4; padding: 18px 0 10px; text-transform: uppercase; }
  .layout { display: flex; flex: 1; overflow: hidden; height: calc(100vh - 56px); }
  .map-area { flex: 1; overflow: auto; padding: 20px; }
  svg#mindmap { width: 100%; min-width: 700px; height: auto; display: block; }
  .node-group { cursor: pointer; }
  .node-group rect { transition: filter 0.15s; }
  .node-group:hover rect { filter: brightness(1.3); }
  .node-group.active rect { filter: brightness(1.5) drop-shadow(0 0 8px rgba(127,119,221,0.6)); }
  .panel { width: 400px; min-width: 300px; background: #16181f; border-left: 1px solid #2a2d3a; display: flex; flex-direction: column; transition: width 0.3s; }
  .panel.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }
  .panel-header { padding: 16px 18px 12px; border-bottom: 1px solid #2a2d3a; display: flex; align-items: center; gap: 10px; }
  .panel-topic { font-size: 1rem; font-weight: 600; flex: 1; color: #e8e6f0; }
  .panel-close { background: none; border: none; color: #666; cursor: pointer; font-size: 1.2rem; padding: 2px 8px; border-radius: 4px; }
  .panel-close:hover { background: #2a2d3a; color: #e8e6f0; }
  .panel-body { flex: 1; overflow-y: auto; padding: 20px; font-size: 0.91rem; line-height: 1.75; color: #c8c4dc; }
  .panel-body h3 { color: #9b91d4; font-size: 0.95rem; font-weight: 600; margin: 18px 0 8px; }
  .panel-body h3:first-child { margin-top: 0; }
  .panel-body p { margin-bottom: 10px; }
  .panel-body strong { color: #e8e6f0; font-weight: 600; }
  .panel-body em { color: #b0a8d8; font-style: italic; }
  .panel-body code { background: #1e2130; border: 1px solid #2a2d3a; border-radius: 4px; padding: 2px 7px; font-family: 'Courier New', monospace; font-size: 0.88rem; color: #a8d8a8; }
  .panel-body pre { background: #1a1d28; border: 1px solid #2a2d3a; border-radius: 8px; padding: 14px 16px; margin: 12px 0; overflow-x: auto; }
  .panel-body pre code { background: none; border: none; padding: 0; color: #a8d8a8; font-size: 0.87rem; }
  .panel-body blockquote { border-left: 3px solid #3d3489; margin: 12px 0; padding: 8px 14px; background: #141620; border-radius: 0 6px 6px 0; color: #b0a8d8; font-size: 0.88rem; }
  .panel-body table { width: 100%; border-collapse: collapse; margin: 12px 0; font-size: 0.86rem; }
  .panel-body th { background: #1e2130; color: #9b91d4; padding: 7px 10px; text-align: left; border: 1px solid #2a2d3a; }
  .panel-body td { padding: 6px 10px; border: 1px solid #2a2d3a; color: #c0bcd8; }
  .panel-body td:first-child { color: #e8e6f0; }
  .panel-body ul { padding-left: 18px; margin: 8px 0; }
  .panel-body li { margin-bottom: 4px; }
  .hint { text-align: center; color: #2a2d3a; font-size: 11px; margin-top: 8px; }
  ::-webkit-scrollbar { width: 5px; }

const CONTENT = {

    title: "Kansrekenen — overzicht",
    html: `<h3>Wat is kansrekenen?</h3>
<p>Kansrekenen is de wiskundige studie van toeval en onzekerheid. <strong>Kans</strong> (notatie: <em>P</em>) is altijd een getal tussen 0 en 1:</p>
<ul>
  <li><strong>P = 0</strong> — de gebeurtenis is onmogelijk</li>
  <li><strong>P = 1</strong> — de gebeurtenis is zeker</li>
  <li><strong>P = 0,5</strong> — fifty-fifty</li>
</ul>
<h3>Overzicht van de cursus</h3>
<table><tr><th>Onderwerp</th><th>Kernformule</th></tr>
<tr><td>Klassieke kans</td><td><code>P(A) = gunstig / totaal</code></td></tr>
<tr><td>Complement</td><td><code>P(Aᶜ) = 1 − P(A)</code></td></tr>
<tr><td>Optelling</td><td><code>P(A∪B) = P(A)+P(B)−P(A∩B)</code></td></tr>
<tr><td>Voorwaardelijk</td><td><code>P(A|B) = P(A∩B)/P(B)</code></td></tr>
<tr><td>Totale kans</td><td><code>P(A) = Σ P(A|Bᵢ)·P(Bᵢ)</code></td></tr>
<tr><td>Bayes</td><td><code>P(B|A) = P(A|B)·P(B)/P(A)</code></td></tr>
<tr><td>Combinaties</td><td><code>C(n,k) = n!/(k!(n−k)!)</code></td></tr>
<tr><td>Binomiaal</td><td><code>P(k) = C(n,k)·pᵏ·(1−p)ⁿ⁻ᵏ</code></td></tr>
</table>`

  basis: {

    html: `<h3>Experiment en uitkomstenruimte</h3>
<p>Een <strong>kansexperiment</strong> is een handeling waarvan de uitkomst onzeker is (bijv. een dobbelsteen gooien).</p>
<p>De <strong>uitkomstenruimte</strong> Ω is de verzameling van alle mogelijke uitkomsten.</p>
<blockquote>Dobbelsteen gooien: Ω = {1, 2, 3, 4, 5, 6}</blockquote>

<p>De <strong>uitkomstenruimte Ω</strong> (omega) is de verzameling van <em>alle</em> mogelijke uitkomsten van een kansexperiment.</p>
<h3>Voorbeelden</h3>
<blockquote>Dobbelsteen: Ω = {1, 2, 3, 4, 5, 6}</blockquote>

<h3>Voorbeelden</h3>
<blockquote>Dobbelsteen, A = "even getal" = {2, 4, 6}</blockquote>
<blockquote>Dobbelsteen, B = "groter dan 4" = {5, 6}</blockquote>
<h3>Bewerkingen op gebeurtenissen</h3>
<ul>
  <li><strong>Complement Aᶜ</strong> — alles wat niet in A zit</li>

</ul>`

const panel = document.getElementById('panel');
const panelTopic = document.getElementById('panel-topic');
const panelBody = document.getElementById('panel-body');

document.querySelectorAll('.node-group').forEach(node => {
  node.addEventListener('click', () => {
    const id = node.dataset.id;
    const data = CONTENT[id];
    if (!data) return;
    document.querySelectorAll('.node-group').forEach(n => n.classList.remove('active'));
    node.classList.add('active');
    panelTopic.textContent = data.title;
    panelBody.innerHTML = data.html;
    panel.classList.remove('collapsed');
  });
});

function closePanel() {
  panel.classList.add('collapsed');
  document.querySelectorAll('.node-group').forEach(n => n.classList.remove('active'));
}
