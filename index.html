<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mindmap Kansrekenen</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0f1117;
    color: #e8e6f0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  h1 {
    text-align: center;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: #9b91d4;
    padding: 18px 0 10px;
    text-transform: uppercase;
  }
  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
    height: calc(100vh - 56px);
  }
  .map-area {
    flex: 1;
    overflow: auto;
    padding: 20px;
  }
  svg#mindmap {
    width: 100%;
    min-width: 700px;
    height: auto;
    display: block;
  }
  .node-group { cursor: pointer; }
  .node-group rect { transition: filter 0.15s; }
  .node-group:hover rect { filter: brightness(1.25); }
  .node-group.active rect { filter: brightness(1.4) drop-shadow(0 0 6px #7F77DD); }

  .panel {
    width: 360px;
    min-width: 280px;
    background: #16181f;
    border-left: 1px solid #2a2d3a;
    display: flex;
    flex-direction: column;
    transition: width 0.3s;
  }
  .panel.collapsed { width: 0; min-width: 0; overflow: hidden; border: none; }
  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid #2a2d3a;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .panel-topic { font-size: 1rem; font-weight: 600; flex: 1; color: #e8e6f0; }
  .panel-close {
    background: none; border: none; color: #666;
    cursor: pointer; font-size: 1.2rem; padding: 2px 6px; border-radius: 4px;
  }
  .panel-close:hover { background: #2a2d3a; color: #e8e6f0; }
  .panel-body {
    flex: 1; overflow-y: auto; padding: 18px;
    font-size: 0.92rem; line-height: 1.7; color: #c8c4dc;
  }
  .panel-body p { margin-bottom: 10px; }
  .panel-body strong { color: #e8e6f0; font-weight: 600; }
  .panel-body code {
    background: #1e2130; border: 1px solid #2a2d3a; border-radius: 4px;
    padding: 2px 6px; font-family: 'Courier New', monospace;
    font-size: 0.85rem; color: #a8d8a8;
  }
  .loading { display: flex; align-items: center; gap: 10px; color: #666; font-size: 0.9rem; padding: 8px 0; }
  .dot-anim span {
    display: inline-block; width: 6px; height: 6px;
    background: #7F77DD; border-radius: 50%;
    animation: bounce 1.2s infinite ease-in-out; margin: 0 2px;
  }
  .dot-anim span:nth-child(2) { animation-delay: 0.2s; }
  .dot-anim span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.6)} 40%{transform:scale(1)} }
  .error-msg { color: #e06c75; font-size: 0.88rem; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: #2a2d3a; border-radius: 3px; }
</style>
</head>
<body>

  <div class="panel collapsed" id="panel">
    <div class="panel-header">
      <span class="panel-topic" id="panel-topic">—</span>
      <button class="panel-close" onclick="closePanel()">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>
</div>

<script>
const panel      = document.getElementById('panel');
const panelTopic = document.getElementById('panel-topic');
const panelBody  = document.getElementById('panel-body');

document.querySelectorAll('.node-group').forEach(node => {
  node.addEventListener('click', () => {
    document.querySelectorAll('.node-group').forEach(n => n.classList.remove('active'));
    node.classList.add('active');
    openPanel(node.dataset.topic, node.dataset.prompt);
  });
});

function openPanel(topic, prompt) {
  panelTopic.textContent = topic;
  panelBody.innerHTML = `<div class="loading"><div class="dot-anim"><span></span><span></span><span></span></div> Uitleg laden…</div>`;
  panel.classList.remove('collapsed');
  askClaude(prompt);
}

function closePanel() {
  panel.classList.add('collapsed');
  document.querySelectorAll('.node-group').forEach(n => n.classList.remove('active'));
}

async function askClaude(prompt) {
  try {
    const res = await fetch('/api/ask', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    const data = await res.json();
    panelBody.innerHTML = data.text || '<p>Geen antwoord ontvangen.</p>';
  } catch (err) {
    panelBody.innerHTML = `<p class="error-msg">⚠️ Fout: ${err.message}</p>`;
  }
}
</script>
</body>
